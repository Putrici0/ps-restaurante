<header class="app-header">
  <div class="header-bar">
    <button
      type="button"
      class="hamburger-btn"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuAbierto()"
      aria-label="Abrir menú"
    >
      ☰
    </button>

    <div class="logo-container">
      <img class="logo" src="logo.png" />
    </div>
  </div>

  @if (menuAbierto()) {
    <div class="menu-panel">
      <nav class="nav-links">
        <a
          [routerLink]="['/menu', tableId()]"
          routerLinkActive="active"
          (click)="cerrarMenu()"
        >
          Menú
        </a>

        <a
          [routerLink]="['/cuenta', tableId()]"
          routerLinkActive="active"
          (click)="cerrarMenu()"
        >
          Cuenta
        </a>
      </nav>
    </div>

  <div
    class="menu-overlay"
    [class.show]="menuAbierto()"
    (click)="cerrarMenu()"
  ></div>
  }
</header>
