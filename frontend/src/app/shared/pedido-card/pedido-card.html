<div class="pedido-card" [class.texto-atenuado]="esOpaco">

  <div class="mesa-box" [ngClass]="'border-' + colorEstado">
    <span class="mesa-label">MESA</span>
    <span class="mesa-numero">{{ numeroMesa }}</span>
  </div>

  <div class="pedido-content">
    <div class="pedido-meta">
      <span class="estado-pill" [ngClass]="'pill-' + colorEstado">
        {{ etiquetaEstado }}
      </span>
      <span class="tiempo-info">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <polyline points="12 6 12 12 16 14"></polyline>
        </svg>
        {{ tiempo }}
      </span>
      <ng-content select="[meta]"></ng-content>
    </div>

    <div class="pedido-items">
      <ng-content></ng-content>
    </div>
  </div>

  <div class="pedido-actions">
    @if (mostrarBotonSecundario) {
      <button
        type="button"
        class="btn-action"
        [ngClass]="'btn-' + claseBotonSecundario"
        [disabled]="disableSecundario"
        (click)="secundario.emit()">
        <span>{{ textoBotonSecundario }}</span>
        @if (iconoSecundario === 'cross') {
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        }
      </button>
    }

    @if (mostrarBotonPrincipal) {
      <button
        type="button"
        class="btn-action"
        [ngClass]="'btn-' + claseBotonPrincipal"
        [disabled]="disablePrincipal"
        (click)="principal.emit()">
        <span>{{ textoBotonPrincipal }}</span>
        @if (iconoPrincipal === 'check') {
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        }
      </button>
    }
  </div>
</div>
