<div class="header">
  <button class="hamburger" (click)="toggleMenu()">☰</button>

  <div class="header-center">
    <img src="/logo.png" alt="Logo" class="header-logo">
  </div>

  <!-- The right side is empty to balance the hamburger menu -->
  <div class="header-right-spacer"></div>
</div>

<div class="sidebar" [class.open]="menuAbierto">
  <a routerLink="mesas" (click)="toggleMenu()">Mesas</a>
  <a routerLink="platos" (click)="toggleMenu()">Platos</a>
  <a routerLink="bebidas" (click)="toggleMenu()">Bebidas</a>
  <button class="logout">Cerrar sesión</button>
</div>

<div class="overlay" [class.show]="menuAbierto" (click)="toggleMenu()"></div>

<!-- Contenido de las páginas -->
<div class="main-content" [class.shift]="menuAbierto">
  <router-outlet></router-outlet>
</div>
