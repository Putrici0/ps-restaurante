<section class="platos-page">
  <div class="page-shell">

    <header class="mobile-sub-header">
      <h1 class="page-title">Platos en Sala</h1>

      <div class="summary-badge">
        <span class="dot"></span>
        <span class="count-text">
          <strong>{{ pendientesDeEntregaCount() }}</strong> Por entregar
        </span>
      </div>
    </header>

    @if (error()) {
    <div class="error-banner">{{ error() }}</div>
    }

    <div class="platos-content">
      @if (cargando() && ordenes().length === 0 && !error()) {
      <div class="loading-state">Cargando platos...</div>
      } @else {
      <div class="platos-list">
        @for (item of ordenesVisuales(); track item.id) {
        <app-pedido-card
          [numeroMesa]="item.mesa"
          [estadoVisual]="item.estado"
          [etiquetaEstado]="item.etiqueta"
          [esOpaco]="item.esEntregado"
          [tiempo]="item.tiempo"
          [textoBotonPrincipal]="item.esEntregado ? 'ENTREGADO' : 'ENTREGAR'"
          [claseBotonPrincipal]="item.esEntregado ? 'gris' : 'verde'"
          [disablePrincipal]="item.esEntregado || item.procesando"
          (principal)="entregarPlato(item.original)"
          [mostrarBotonSecundario]="item.esEntregado"
          [textoBotonSecundario]="'DESHACER'"
          [claseBotonSecundario]="'rojo'"
          [disableSecundario]="item.procesando"
          (secundario)="deshacerEntrega(item.original)">

          <span class="plato-nombre">{{ item.nombre }}</span>

        </app-pedido-card>
        }
      </div>
      }
    </div>
  </div>
</section>
